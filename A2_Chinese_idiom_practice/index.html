<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語理解互動測驗</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="quiz-container">
        <!-- 1. 出題設定頁面 -->
        <div id="setup-screen">
            <h1>成語測驗出題設定</h1>
            <p class="mb-4 text-gray-600">請輸入你要出題的成語，並設定題目數量。系統將會隨機選取成語來生成題目。</p>
            
            <!-- 預設成語庫 (現在是可編輯的 textarea) -->
            <details class="bg-gray-100 p-3 rounded-lg mb-4" open>
                <summary class="font-bold text-gray-700 cursor-pointer">預設成語庫 (可編輯擴充)</summary>
                <textarea id="default-idioms-list-editable" rows="5" class="text-sm text-gray-700 mt-2 p-2 w-full border border-gray-300 rounded"></textarea>
            </details>

            <label for="question-count" class="setting-label">題目數量：</label>
            <input type="number" id="question-count" value="5" min="1">
            
            <label for="idioms-list" class="setting-label">出題詞庫 (用空格、逗號或換行分隔)：</label>
            <button class="random-btn" onclick="selectRandomIdiomsToQuizList()">隨機選詞</button>
            <textarea id="idioms-list" rows="5" placeholder="例如：同心協力, 自告奮勇, 百折不撓, 百思不解"></textarea>

            <button class="generate-btn" id="generate-btn" onclick="regenerateQuiz()">出題</button>
            <div id="loading-indicator" class="loading-indicator" style="display: none;">
                <p>💡 AI 正在努力出題中，請稍候... (約 5-15 秒)</p>
            </div>
        </div>
        
        <!-- 2. 測驗頁面 (原來的 quiz-area) -->
        <div id="quiz-area" style="display: none;">
            <h1>成語理解大挑戰</h1>
            <div id="quiz-content">
                <p class="question-text" id="question-text"></p>
                <div class="options-container" id="options-container">
                    <!-- 選項按鈕將由 JavaScript 生成 -->
                </div>
            </div>
            
            <p style="text-align: center; margin-top: 20px; color: #555;">
                <span id="progress"></span>
            </p>

            <div class="nav-buttons">
                <button class="nav-btn" id="setup-btn" onclick="showSetupScreen()">返回設定</button>
                <button class="nav-btn" id="prev-btn" onclick="goPrev()">上一題</button>
                <button class="nav-btn" id="next-btn" onclick="goNext()">下一題</button>
                <button class="nav-btn submit-btn" id="submit-btn" onclick="handleSubmit()">交卷</button>
            </div>
        </div>
        
        <!-- 3. 結果頁面 -->
        <div id="result-screen" class="result-screen" style="display: none;">
            <!-- 結果畫面將由 JavaScript 顯示 -->
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
