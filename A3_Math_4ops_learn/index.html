<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>數學小老師</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <div class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-600">🧮 數學小老師</h1>
            <p class="text-gray-500 mt-2">請點擊空格輸入數字，讓我為您分解步驟！</p>
        </div>

        <div class="flex items-center gap-2">
            <input type="number" id="numA" placeholder="數字 A" onfocus="showKeypad(this)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" class="w-full px-4 py-3 text-lg border-2 border-gray-200 rounded-xl focus:outline-none transition duration-300">
            <span id="operator-display" class="text-3xl font-bold w-8 text-center text-gray-400">?</span>
            <input type="number" id="numB" placeholder="數字 B" onfocus="showKeypad(this)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" class="w-full px-4 py-3 text-lg border-2 border-gray-200 rounded-xl focus:outline-none transition duration-300">
            <button onclick="calculate()" id="equals-btn" class="text-3xl font-bold bg-blue-600 text-white rounded-xl py-3 px-5 hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition-transform transform hover:scale-105">=</button>
        </div>
        
        <!-- Relocated Keypad -->
        <div id="keypad-container">
            <div class="keypad-grid">
                <button onclick="keypadInput('1')" class="keypad-btn bg-white">1</button>
                <button onclick="keypadInput('2')" class="keypad-btn bg-white">2</button>
                <button onclick="keypadInput('3')" class="keypad-btn bg-white">3</button>
                <button onclick="selectOperator('+')" class="keypad-btn bg-green-500 text-white">+</button>
                <button onclick="keypadInput('4')" class="keypad-btn bg-white">4</button>
                <button onclick="keypadInput('5')" class="keypad-btn bg-white">5</button>
                <button onclick="keypadInput('6')" class="keypad-btn bg-white">6</button>
                <button onclick="selectOperator('-')" class="keypad-btn bg-orange-500 text-white">−</button>
                <button onclick="keypadInput('7')" class="keypad-btn bg-white">7</button>
                <button onclick="keypadInput('8')" class="keypad-btn bg-white">8</button>
                <button onclick="keypadInput('9')" class="keypad-btn bg-white">9</button>
                <button onclick="selectOperator('*')" class="keypad-btn bg-purple-500 text-white">×</button>
                <button onclick="keypadClear()" class="keypad-btn bg-gray-300">C</button>
                <button onclick="keypadInput('0')" class="keypad-btn bg-white">0</button>
                <button onclick="keypadBackspace()" class="keypad-btn bg-gray-300">DEL</button>
                <button onclick="selectOperator('/')" class="keypad-btn bg-red-500 text-white">÷</button>
                <button onclick="hideKeypad()" class="keypad-btn bg-blue-500 text-white col-span-4">收合</button>
            </div>
        </div>

        <div class="text-center mt-4 p-3 bg-green-50 rounded-lg">
            <span class="text-gray-600 text-lg">答案:</span>
            <span id="final-answer-box" class="text-3xl font-bold text-green-600 font-mono ml-2">-</span>
        </div>

        <!-- Animation Controls -->
        <div class="flex items-center justify-center gap-4 my-4">
            <div class="flex items-center gap-2">
                 <label for="speed-control" class="text-gray-600">速度:</label>
                 <select id="speed-control" class="rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                    <option value="1000">最快 (1s)</option>
                    <option value="2000" selected>快速 (2s)</option>
                    <option value="3000">中等 (3s)</option>
                    <option value="4000">慢速 (4s)</option>
                    <option value="5000">最慢 (5s)</option>
                 </select>
            </div>
            <button id="pause-play-btn" onclick="togglePause()" class="p-2 rounded-full bg-gray-200 hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" disabled>
                <!-- Pause Icon -->
                <svg id="pause-icon" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1zm4 0a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                <!-- Play Icon -->
                <svg id="play-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            </button>
            <button id="cancel-btn" onclick="cancelCalculation()" class="p-2 rounded-full bg-red-200 text-red-700 hover:bg-red-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500" disabled>
                <!-- Cancel Icon (Stop) -->
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 9a1 1 0 00-1 1v.01L7 10a1 1 0 001 1h4a1 1 0 100-2H8z" clip-rule="evenodd"></path></svg>
            </button>
        </div>

        <div id="result-container" class="bg-gray-50 p-4 rounded-xl border border-gray-200 min-h-[200px] text-gray-800 overflow-x-auto">
            <div id="calculation-steps" class="calculation-display"></div>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
