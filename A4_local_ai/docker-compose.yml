version: '3.8'

services:
  llm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-llm-api
    ports:
      - "8000:8000"
    volumes:
      # Mount models directory to persist downloaded models
      - ./models:/app/models
      # Mount config for easy updates
      - ./.env:/app/.env:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - API_HOST=0.0.0.0
      - API_PORT=8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: llm-network
