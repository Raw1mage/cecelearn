<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語音及文字查字典</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>中文字詞查詢</h1>
        <div class="input-area">
            <input type="text" id="wordInput" placeholder="輸入要查詢的詞或字">
            <button type="button" id="lookupButton">查詢</button>
            <button type="button" id="micButton">🎤 語音</button>
        </div>
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
