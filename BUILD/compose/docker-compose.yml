services:
  frontend:
    build:
      context: ../..
      dockerfile: BUILD/docker/frontend.Dockerfile
    env_file:
      - ../env/frontend.env

  backend:
    build:
      context: ../..
      dockerfile: BUILD/docker/backend.Dockerfile
    env_file:
      - ../env/backend.env

  gateway:
    build:
      context: ../..
      dockerfile: BUILD/docker/gateway.Dockerfile
    depends_on:
      - frontend
      - backend
    ports:
      - "7014:7014"
    env_file:
      - ../env/gateway.env
